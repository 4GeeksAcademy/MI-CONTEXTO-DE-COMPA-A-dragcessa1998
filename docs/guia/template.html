<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexova — Guía profesional de 0 a Experto</title>
<style>
:root{
  --ink:#1b2733; --muted:#5b6b7b; --line:#d9e1e8;
  --accent:#0d9488; --accent-dark:#0f766e; --navy:#16283d; --coral:#ea6a2e;
  --code-bg:#f6f8fa;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:Georgia,"Iowan Old Style","Times New Roman",serif;
  color:var(--ink); font-size:11pt; line-height:1.6;
  -webkit-print-color-adjust:exact; print-color-adjust:exact;
}
.content{padding:0 22mm}

/* ---------- Encabezados ---------- */
h1,h2,h3,h4{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;color:var(--navy);line-height:1.2}
h1{font-size:23pt;font-weight:800;break-before:page;margin:0 0 .2em;padding-bottom:.35em;border-bottom:3px solid var(--accent);color:var(--accent-dark)}
h1::after{content:"";display:block}
h2{font-size:15.5pt;font-weight:700;margin:1.5em 0 .45em;color:var(--navy)}
h3{font-size:12.5pt;font-weight:700;margin:1.2em 0 .35em;color:var(--accent-dark)}
h1,h2,h3,h4{break-after:avoid}
p{margin:.55em 0;text-align:justify;hyphens:auto}
ul,ol{margin:.5em 0 .8em;padding-left:1.4em}
li{margin:.22em 0}
strong{color:var(--navy)}
a{color:var(--accent-dark);text-decoration:none}

/* ---------- Código ---------- */
code{font-family:"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;font-size:9.5pt;background:var(--code-bg);padding:1px 5px;border-radius:4px;color:#0b3a44}
pre{background:var(--code-bg);border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:8px;padding:11px 14px;margin:.9em 0;overflow:hidden;break-inside:avoid;white-space:pre-wrap;word-wrap:break-word}
pre code{background:none;padding:0;font-size:9pt;line-height:1.5;color:#1b2733}

/* ---------- Tablas ---------- */
table{border-collapse:collapse;width:100%;margin:1em 0;font-size:9.8pt;break-inside:avoid}
th,td{border:1px solid var(--line);padding:7px 10px;text-align:left;vertical-align:top}
thead th{background:var(--navy);color:#fff;font-family:"Helvetica Neue",Arial,sans-serif;font-weight:600;font-size:9.2pt}
tbody tr:nth-child(even){background:#f4f8f9}

/* ---------- Recuadros (callouts) ---------- */
.callout{border-radius:8px;padding:11px 15px 11px 15px;margin:1em 0;border-left:5px solid;break-inside:avoid;font-size:10.2pt}
.callout p{margin:.25em 0;text-align:left}
.callout p:first-child{margin-top:0}.callout p:last-child{margin-bottom:0}
.callout.tip{background:#ecfdf5;border-color:#10b981}
.callout.note{background:#eff6ff;border-color:#3b82f6}
.callout.warning{background:#fffbeb;border-color:#f59e0b}
.callout.important{background:#fef2f2;border-color:#ef4444}

/* ---------- Lista "aprenderás" ---------- */
.content h1 + p + ul, .content h1 + ul{}

/* ---------- Portada ---------- */
.cover{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;text-align:center;background:linear-gradient(180deg,#ffffff 0%, #f2fbfa 55%, #e8f6f4 100%);break-after:page;padding:18mm 20mm 0}
.cover .logo4g{width:78px;height:78px;border-radius:16px;box-shadow:0 6px 18px rgba(13,148,136,.25);margin-bottom:10mm}
.cover .kicker{font-family:"Helvetica Neue",Arial,sans-serif;letter-spacing:.32em;text-transform:uppercase;color:var(--accent-dark);font-size:10pt;font-weight:700;margin-bottom:5mm}
.cover h1.title{border:none;break-before:auto;font-size:46pt;font-weight:800;color:var(--navy);margin:0;line-height:1.04}
.cover .subtitle{font-family:"Helvetica Neue",Arial,sans-serif;font-size:14pt;color:var(--muted);margin:6mm 0 9mm;max-width:150mm;font-weight:400}
.cover .banner{width:100%;max-width:172mm;border-radius:12px;box-shadow:0 10px 30px rgba(22,40,61,.18);margin-top:2mm}
.cover .byline{margin-top:auto;margin-bottom:16mm;font-family:"Helvetica Neue",Arial,sans-serif;color:var(--navy);font-size:11pt}
.cover .byline .role{color:var(--muted);font-size:10pt}

/* ---------- Colofón ---------- */
.colophon{padding:30mm 26mm;break-after:page;font-size:10pt;color:var(--muted)}
.colophon h2{border:none;color:var(--navy);font-size:13pt;margin-top:0}
.colophon p{text-align:left}
.colophon .rule{height:3px;width:60px;background:var(--accent);margin:0 0 8mm}

/* ---------- Página de contenido (TOC) ---------- */
.toc-title{break-before:auto;border-bottom:3px solid var(--accent)}
nav#TOC ul{list-style:none;padding-left:0;margin:.4em 0}
nav#TOC > ul > li{font-family:"Helvetica Neue",Arial,sans-serif;font-size:11pt;margin:.5em 0;padding-bottom:.45em;border-bottom:1px dotted var(--line);color:var(--navy)}
nav#TOC > ul > li > a{color:var(--navy);font-weight:600}
nav#TOC ul ul{margin:.25em 0 .25em 1.1em}
nav#TOC ul ul li{font-size:10pt;border:none;font-weight:400;color:var(--muted);padding-bottom:0;margin:.18em 0}
nav#TOC ul ul li a{color:var(--muted)}

/* ---------- Divisores de Parte ---------- */
.part{margin:0 -22mm;min-height:86vh;display:flex;flex-direction:column;justify-content:center;padding:0 30mm;background:linear-gradient(135deg,var(--navy) 0%, #0f766e 100%);color:#fff;break-before:page}
.part .pnum{font-family:"Helvetica Neue",Arial,sans-serif;letter-spacing:.3em;text-transform:uppercase;color:#7fe3d6;font-size:12pt;font-weight:700}
.part .ptitle{font-family:"Helvetica Neue",Arial,sans-serif;font-size:30pt;font-weight:800;margin:6mm 0 5mm;line-height:1.1}
.part .pdesc{font-size:13pt;color:#d6efe9;max-width:140mm;line-height:1.5}
.part .prule{height:4px;width:70px;background:var(--coral);margin:2mm 0 6mm}

/* Evitar números de figura huérfanos */
img{max-width:100%}
</style>
<style>
$highlighting-css$
</style>
</head>
<body>
@@COVER@@
@@COLOPHON@@
<div class="content">
<section class="toc-page">
<h1 class="toc-title">Contenido</h1>
<nav id="TOC" role="doc-toc">
$toc$
</nav>
</section>
$body$
</div>
</body>
</html>
